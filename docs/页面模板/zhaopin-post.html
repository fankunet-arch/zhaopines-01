<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布信息 · 西华招聘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7F1; --ink:#221E2E; --ink-soft:#7A7486;
    --coral:#FF5A3C; --coral-soft:#FFEDE8;
    --jade:#0FB89A; --jade-soft:#E3F7F1;
    --sun:#FFC83D; --card:#FFFFFF; --line:rgba(34,30,46,.09);
    --shadow-card:0 2px 0 rgba(34,30,46,.04), 0 10px 24px -14px rgba(34,30,46,.2);
    --disp:"Bricolage Grotesque","Noto Sans SC",sans-serif;
    --body:"Noto Sans SC","Bricolage Grotesque",sans-serif;
    --accent:var(--coral); --accent-soft:var(--coral-soft);
  }
  body[data-mode="seek"]{--accent:var(--jade); --accent-soft:var(--jade-soft)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;min-height:100vh}
  button{font-family:var(--body)}
  a{color:inherit;text-decoration:none}

  /* nav */
  .nav{display:flex;align-items:center;gap:16px;padding:14px 5vw;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:50}
  .back{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft);cursor:pointer}
  .back svg{width:18px;height:18px}
  .brand .zh{font-weight:900;letter-spacing:.04em;font-size:21px}
  .brand .hl{color:var(--coral)}
  .nav .spacer{flex:1}
  .nav .dom{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--ink-soft)}

  .shell{max-width:1040px;margin:0 auto;padding:30px 5vw 70px}

  /* head */
  .head h1{font-family:var(--disp);font-weight:800;font-size:clamp(26px,4vw,36px);letter-spacing:-.01em;margin-bottom:7px}
  .head p{color:var(--ink-soft);font-size:15px;margin-bottom:20px}
  .head p b{color:var(--ink);font-weight:700}
  .seg{background:#fff;border:1px solid var(--line);border-radius:15px;padding:5px;display:inline-flex;box-shadow:var(--shadow-card);margin-bottom:28px}
  .seg button{border:0;cursor:pointer;background:transparent;font-weight:700;font-size:15px;color:var(--ink-soft);padding:12px 28px;border-radius:11px;transition:background .15s,color .15s}
  .seg button.on{color:#fff;background:var(--accent);box-shadow:0 8px 16px -8px var(--accent)}

  /* columns */
  .cols{display:grid;gap:30px;grid-template-columns:1fr 350px;grid-template-areas:"form preview"}
  .formcol{grid-area:form}
  .previewcol{grid-area:preview;position:sticky;top:92px;align-self:start}

  /* form */
  .panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px;box-shadow:var(--shadow-card)}
  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  .lab{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .lab .req{color:var(--accent)}
  .lab .opt{color:var(--ink-soft);font-weight:500;font-size:12px;margin-left:4px}
  .input,.area{width:100%;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px 14px;font-family:var(--body);font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
  .input::placeholder,.area::placeholder{color:var(--ink-soft)}
  .input:focus,.area:focus,.sel:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .area{resize:none;min-height:88px;line-height:1.5}
  .selwrap{position:relative}
  .selwrap::after{content:"▾";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;font-size:12px}
  .sel{width:100%;appearance:none;-webkit-appearance:none;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px 34px 13px 14px;font-family:var(--body);font-size:15px;color:var(--ink);outline:none;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row .field{flex:1;min-width:140px;margin-bottom:18px}

  .chiprow{display:flex;flex-wrap:wrap;gap:8px}
  .pick{cursor:pointer;font-size:14px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 15px;color:var(--ink);transition:.15s}
  .pick.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .submit{width:100%;border:0;cursor:pointer;border-radius:15px;background:var(--accent);color:#fff;font-weight:700;font-size:16px;padding:16px;margin-top:6px;box-shadow:0 12px 24px -10px var(--accent);transition:filter .15s}
  .submit:hover{filter:brightness(1.05)}
  .notes{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .note{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .note svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px;color:var(--accent)}
  .note b{color:var(--ink);font-weight:700}

  /* preview */
  .peyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:12px}
  .peyebrow .d{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--accent-soft)}50%{box-shadow:0 0 0 7px var(--accent-soft)}}
  .pafter{margin-top:12px;font-size:12.5px;color:var(--ink-soft);line-height:1.5;text-align:center}

  /* card (same as board) */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:17px 19px;box-shadow:var(--shadow-card);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .ctop{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .tag{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 10px;border-radius:8px}
  .new{font-family:var(--disp);font-size:11px;font-weight:800;color:#5a4500;background:var(--sun);padding:4px 9px;border-radius:8px;letter-spacing:.03em;box-shadow:0 0 0 4px rgba(255,200,61,.25)}
  .ago{margin-left:auto;font-size:12.5px;color:var(--ink-soft)}
  .ptitle{font-weight:700;font-size:17px;line-height:1.35;margin-bottom:9px}
  .ptitle.ph{color:var(--ink-soft);font-weight:500}
  .meta{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink-soft);margin-bottom:12px}
  .meta svg{width:14px;height:14px;flex:0 0 auto}
  .cfoot{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .pay{font-family:var(--disp);font-weight:800;font-size:18px;color:var(--ink)}
  .cact{margin-left:auto;display:flex;gap:9px}
  .call{border:0;border-radius:11px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:10px 15px;display:flex;align-items:center;gap:8px}
  .call svg{width:15px;height:15px}.call .num{font-family:var(--disp);opacity:.85}
  .wx{border:1px solid var(--line);background:#fff;border-radius:11px;width:44px;display:flex;align-items:center;justify-content:center;color:#3aa84a}
  .wx svg{width:20px;height:20px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:14px 22px;border-radius:14px;font-size:14px;font-weight:700;box-shadow:0 16px 40px -12px rgba(34,30,46,.6);opacity:0;pointer-events:none;transition:.3s;z-index:90;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:18px;height:18px;color:#7CF2C8}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:820px){
    .cols{grid-template-columns:1fr;grid-template-areas:"preview" "form"}
    .previewcol{position:static}
    .nav .dom{display:none}
  }
</style>
</head>
<body data-mode="hire">

  <nav class="nav">
    <span class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>返回</span>
    <div class="brand"><span class="zh">西华<span class="hl">招聘</span></span></div>
    <span class="spacer"></span>
    <span class="dom">zhaopin.es</span>
  </nav>

  <div class="shell">
    <div class="head">
      <h1>发布信息</h1>
      <p>填几项就行，<b>1 分钟搞定</b> · 免注册 · 帖子 30 天有效</p>
      <div class="seg">
        <button data-mode="hire" class="on">我要招人</button>
        <button data-mode="seek">我要找活</button>
      </div>
    </div>

    <div class="cols">

      <!-- ===== FORM ===== -->
      <div class="formcol">
        <div class="panel">

          <div class="field">
            <label class="lab">工种 <span class="req">*</span></label>
            <div class="chiprow" id="picks">
              <span class="pick on">后厨</span>
              <span class="pick">跑堂</span>
              <span class="pick">百元店</span>
              <span class="pick">美甲</span>
              <span class="pick">奶茶</span>
              <span class="pick">其他</span>
            </div>
          </div>

          <div class="field">
            <label class="lab" id="labTitle">一句话说明 <span class="req">*</span></label>
            <input class="input" id="fTitle" placeholder="如：急招川菜炒锅师傅，有经验优先">
          </div>

          <div class="row">
            <div class="field" id="fieldStore">
              <label class="lab">店名 <span class="opt">选填</span></label>
              <input class="input" id="fStore" placeholder="如：老李川菜馆">
            </div>
            <div class="field">
              <label class="lab" id="labZona">工作地区 <span class="req">*</span></label>
              <span class="selwrap">
                <select class="sel" id="fZona">
                  <option>Usera</option><option>Cuatro Caminos</option><option>Carabanchel</option>
                  <option>Tetuán</option><option>Centro</option><option>其他地区</option>
                </select>
              </span>
            </div>
          </div>

          <div class="field">
            <label class="lab" id="labPay">待遇 <span class="opt">选填</span></label>
            <input class="input" id="fPay" placeholder="如：1600€/月 包食宿">
          </div>

          <div class="row">
            <div class="field">
              <label class="lab">联系电话 <span class="req">*</span></label>
              <input class="input" id="fTel" inputmode="numeric" placeholder="612 34 56 78">
            </div>
            <div class="field">
              <label class="lab">微信 <span class="opt">选填</span></label>
              <input class="input" id="fWx" placeholder="微信号">
            </div>
          </div>

          <div class="field">
            <label class="lab">补充说明 <span class="opt">选填</span></label>
            <textarea class="area" id="fNote" placeholder="工作时间、要求、能否包吃住等，可不填"></textarea>
          </div>

          <button class="submit" id="submitBtn">发布招聘</button>

          <div class="notes">
            <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"/></svg><span>免注册。发布后给你一个<b>管理链接</b>，凭它随时改或删。</span></div>
            <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>招到人随手点一下就<b>下架</b>，否则 <b>30 天</b>自动过期，列表永远新鲜。</span></div>
            <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><span>电话默认<b>遮号</b>显示，对方点「拨打」才看到完整号码。</span></div>
          </div>

        </div>
      </div>

      <!-- ===== LIVE PREVIEW ===== -->
      <div class="previewcol">
        <div class="peyebrow"><span class="d"></span>实时预览</div>
        <div class="card" id="preview"><!-- rendered by JS --></div>
        <p class="pafter">发布后会显示在「今日」最上方</p>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>已发布 · 30 天后自动下架（演示）</div>

<script>
const ICON_PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const ICON_TEL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>';
const ICON_WX  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 4C5 4 2 6.6 2 9.9c0 1.8 1 3.4 2.6 4.5L4 17l2.7-1.4c.7.2 1.5.3 2.3.3h.6a4.6 4.6 0 0 1-.2-1.3c0-3 2.9-5.3 6.4-5.3h.6C15.8 6 12.7 4 9 4z"/></svg>';

const $=id=>document.getElementById(id);

function selectedJob(){ const on=document.querySelector('#picks .pick.on'); return on?on.textContent.trim():'后厨'; }
function maskTel(t){ const d=t.replace(/\s/g,''); return d?d.slice(0,3)+' ·· ··':'—'; }

function updatePreview(){
  const mode = document.body.dataset.mode;
  const job  = selectedJob();
  const title= $('fTitle').value.trim();
  const store= $('fStore').value.trim();
  const zona = $('fZona').value;
  const pay  = $('fPay').value.trim();
  const tel  = $('fTel').value.trim();
  const wx   = $('fWx').value.trim();

  const tag  = mode==='hire' ? job : '求职 · '+job;
  const place= mode==='hire' ? (store ? `${store} · ${zona}` : zona) : `本人现居 ${zona}`;
  const titleHTML = title
      ? `<div class="ptitle">${title}</div>`
      : `<div class="ptitle ph">${mode==='hire'?'（在左侧填写，这里实时预览）':'（在上方填写，这里实时预览）'}</div>`;

  $('preview').innerHTML = `
    <div class="ctop"><span class="tag">${tag}</span><span class="new">今日新</span><span class="ago">刚刚</span></div>
    ${titleHTML}
    <div class="meta">${ICON_PIN}${place}</div>
    <div class="cfoot">
      <div class="pay">${pay||'面议'}</div>
      <div class="cact">
        <button class="call">${ICON_TEL}拨打 <span class="num">${maskTel(tel)}</span></button>
        ${wx?`<button class="wx">${ICON_WX}</button>`:''}
      </div>
    </div>`;
}

// mode toggle
document.querySelectorAll('.seg button[data-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const mode=btn.dataset.mode;
    document.body.dataset.mode=mode;
    document.querySelectorAll('.seg button[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
    const hire = mode==='hire';
    $('fieldStore').style.display = hire?'':'none';
    $('labZona').innerHTML = (hire?'工作地区':'现居地区')+' <span class="req">*</span>';
    $('labPay').innerHTML = (hire?'待遇':'期望待遇')+' <span class="opt">选填</span>';
    $('fTitle').placeholder = hire?'如：急招川菜炒锅师傅，有经验优先':'如：找帮厨工作，能吃苦，可全职';
    $('fPay').placeholder = hire?'如：1600€/月 包食宿':'如：1500€/月，面议';
    $('fNote').placeholder = hire?'工作时间、要求、能否包吃住等，可不填':'经验、可上工时间、期望等，可不填';
    $('submitBtn').textContent = hire?'发布招聘':'发布求职';
    updatePreview();
  });
});

// job picker
$('picks').addEventListener('click',e=>{
  const p=e.target.closest('.pick'); if(!p) return;
  document.querySelectorAll('#picks .pick').forEach(x=>x.classList.remove('on'));
  p.classList.add('on'); updatePreview();
});

// inputs
['fTitle','fStore','fZona','fPay','fTel','fWx'].forEach(id=>{
  $(id).addEventListener('input',updatePreview);
  $(id).addEventListener('change',updatePreview);
});

// submit (demo)
$('submitBtn').addEventListener('click',()=>{
  const t=$('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
});

updatePreview();
</script>
</body>
</html>
